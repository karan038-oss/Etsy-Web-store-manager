<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etsy & Web Store Financial Manager</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js CDN for Analytics Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- SheetJS (XLSX) CDN for Excel Import/Export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <!-- Custom Application Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased selection:bg-emerald-500 selection:text-slate-950 transition-colors duration-200">
  
  <!-- Main Header Navigation -->
  <header id="app-header" class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30 transition-colors duration-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 gap-4">
        
        <!-- App Title & Channel Badge -->
        <div class="flex items-center space-x-3 shrink-0">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-emerald-600 to-teal-500 flex items-center justify-center text-white shadow-md shadow-emerald-500/20">
            <i data-lucide="store" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="flex items-center space-x-2">
              <h1 class="text-base font-bold text-slate-900 dark:text-slate-100 tracking-tight">Etsy & Web Store</h1>
              <span id="header-channel-badge" class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-emerald-500/10 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20 uppercase tracking-wide">
                All Channels
              </span>
            </div>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium hidden sm:block">Unified Profit & Loss Ledger</p>
          </div>
        </div>

        <!-- Navigation Tabs -->
        <nav class="hidden lg:flex items-center space-x-1 overflow-x-auto py-1 scrollbar-none" id="nav-tabs-desktop">
          <!-- Dynamically populated tab buttons -->
        </nav>

        <!-- Right Header Tools -->
        <div class="flex items-center space-x-2 shrink-0">
          
          <!-- Channel Filter Dropdown / Selector -->
          <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200 dark:border-slate-700/80 flex items-center space-x-1 text-xs font-medium" id="channel-filter-group">
            <button data-channel="All" class="channel-btn px-2.5 py-1 rounded-md transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200">All</button>
            <button data-channel="Etsy" class="channel-btn px-2.5 py-1 rounded-md transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200 flex items-center space-x-1">
              <i data-lucide="store" class="w-3 h-3 text-amber-500"></i>
              <span>Etsy</span>
            </button>
            <button data-channel="Website" class="channel-btn px-2.5 py-1 rounded-md transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200 flex items-center space-x-1">
              <i data-lucide="globe" class="w-3 h-3 text-blue-500"></i>
              <span>Web</span>
            </button>
          </div>

          <!-- Theme Mode Switcher -->
          <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200 dark:border-slate-700/80 flex items-center space-x-1 text-xs font-medium" id="theme-mode-group" title="Appearance Theme Mode">
            <button data-theme="system" class="theme-btn p-1.5 rounded-md transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100" title="System Theme">
              <i data-lucide="monitor" class="w-3.5 h-3.5"></i>
            </button>
            <button data-theme="light" class="theme-btn p-1.5 rounded-md transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100" title="Light Theme">
              <i data-lucide="sun" class="w-3.5 h-3.5"></i>
            </button>
            <button data-theme="dark" class="theme-btn p-1.5 rounded-md transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100" title="Dark Theme">
              <i data-lucide="moon" class="w-3.5 h-3.5"></i>
            </button>
          </div>

          <!-- Export Excel Button -->
          <button id="btn-export-excel-header" class="hidden sm:flex items-center space-x-1.5 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold border border-slate-200 dark:border-slate-700 transition-all">
            <i data-lucide="download" class="w-3.5 h-3.5 text-emerald-500"></i>
            <span>Export Excel</span>
          </button>

          <!-- Add Entry Button -->
          <button id="btn-open-add-modal" class="flex items-center space-x-1.5 px-3.5 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold shadow-md shadow-emerald-600/20 transition-all">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span class="hidden sm:inline">New Record</span>
          </button>

        </div>
      </div>

      <!-- Mobile Navigation Scroll Bar -->
      <div class="lg:hidden border-t border-slate-200 dark:border-slate-800 py-2 flex items-center space-x-1 overflow-x-auto scrollbar-none" id="nav-tabs-mobile">
        <!-- Dynamically populated mobile tab buttons -->
      </div>
    </div>
  </header>

  <!-- Main View Container -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-16">
    
    <!-- Quick Summary Banner -->
    <div id="quick-summary-container"></div>

    <!-- Active Tab View Content Container -->
    <div id="tab-view-container"></div>

  </main>

  <!-- Global Modal Container for Add Entry & Sync -->
  <div id="modal-container"></div>

  <!-- Custom Application JavaScript Entrypoint -->
  <script src="script.js"></script>
</body>
</html>
